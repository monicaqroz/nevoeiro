<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nevoeiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <a href="index.html" class="brand">
        Nevoeiro
        <div class="brand-tagline">Um espaço para pensar, estudar e criar</div>
      </a>
      <nav class="nav">
        <a href="index.html" class="active">Home</a>
        <a href="artigos.html">Artigos</a>
        <a href="projetos.html">Projetos</a>
        <a href="sobre.html">Sobre mim</a>
      </nav>
    </aside>

    <main class="content home-stage">
      <div class="fog" aria-hidden="true">
        <div class="fog-layer fog-1"></div>
        <div class="fog-layer fog-2"></div>
        <div class="fog-layer fog-3"></div>
        <div class="fog-layer fog-4"></div>
      </div>
      <div class="fog-veil" aria-hidden="true"></div>

      <div class="balloon-wrap">
        <svg class="balloon-svg" viewBox="0 0 420 460" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="balloonFade" cx="50%" cy="40%" r="62%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="55%" stop-color="#ffffff"/>
              <stop offset="100%" stop-color="#d6d6d6"/>
            </radialGradient>
          </defs>

          <g stroke-linejoin="round" stroke-linecap="round">
            <!-- pássaros ao fundo -->
            <path d="M60,50 C65,45 70,45 75,50 C80,45 85,45 90,50" fill="none" stroke="#bcbcbc" stroke-width="2" opacity="0.6"/>
            <path d="M330,90 C335,85 340,85 345,90 C350,85 355,85 360,90" fill="none" stroke="#bcbcbc" stroke-width="2" opacity="0.6"/>

            <!-- cordas -->
            <line x1="125" y1="350" x2="160" y2="384" stroke="#4a4a4a" stroke-width="2.5"/>
            <line x1="175" y1="356" x2="180" y2="384" stroke="#4a4a4a" stroke-width="2.5"/>
            <line x1="245" y1="356" x2="240" y2="384" stroke="#4a4a4a" stroke-width="2.5"/>
            <line x1="295" y1="350" x2="260" y2="384" stroke="#4a4a4a" stroke-width="2.5"/>

            <!-- envelope do balão: bem largo e arredondado -->
            <path d="M210,18
                     C320,18 388,105 388,210
                     C388,285 352,332 296,352
                     C296,361 290,366 282,366
                     L138,366
                     C130,366 124,361 124,352
                     C68,332 32,285 32,210
                     C32,105 100,18 210,18 Z"
                  fill="url(#balloonFade)" stroke="#3a3a3a" stroke-width="4"/>

            <!-- costuras / textura, discretas -->
            <path d="M210,22 C210,140 210,260 220,363" fill="none" stroke="#c9c9c9" stroke-width="1.5" opacity="0.5"/>
            <path d="M120,45 C90,140 90,270 145,358" fill="none" stroke="#c9c9c9" stroke-width="1.5" opacity="0.45"/>
            <path d="M300,45 C330,140 330,270 275,358" fill="none" stroke="#c9c9c9" stroke-width="1.5" opacity="0.45"/>

            <!-- cesta -->
            <rect x="160" y="384" width="100" height="44" rx="6" fill="#d8d8d8" stroke="#3a3a3a" stroke-width="3"/>
            <line x1="160" y1="399" x2="260" y2="399" stroke="#3a3a3a" stroke-width="1.2" opacity="0.5"/>
            <line x1="160" y1="413" x2="260" y2="413" stroke="#3a3a3a" stroke-width="1.2" opacity="0.5"/>
          </g>
        </svg>

        <div class="balloon-content">
          <span class="eyebrow">Último artigo</span>
          <h2 class="article-title"><a href="artigos/bem-vindo.html">Bem-vindo ao Nevoeiro</a></h2>
          <span class="article-date">13 de julho de 2026</span>
          <p class="article-excerpt">
            Este é o primeiro artigo do ateliê. Um lugar para registrar ideias em andamento,
            estudos e projetos — sem pressa de estarem prontos.
          </p>
          <a class="read-more" href="artigos/bem-vindo.html">Ler artigo completo →</a>
        </div>
      </div>
    </main>
  </div>

  <script src="js/nevoeiro.js"></script>
</body>
</html>
